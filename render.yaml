databases:
  - name: robotjudge-db
    plan: free
    databaseName: robotjudge
    user: rj

services:
  - type: web
    name: robotjudge-ci
    plan: free
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: robotjudge-db
          property: connectionString
